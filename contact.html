<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Pran Taewin</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>

<body>

  <header class="header">
    <a href="index.html" class="logo">Pran Portfolio<span>.</span></a>
    <i class="bx bx-menu" id="menu-icon"></i>
    <nav class="navbar">
      <a href="index.html">Home</a>
      <a href="works.html">Works</a>
      <a href="about.html">About</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </header>

  <main>
    <section class="hero subpage-hero">
      <div class="hero-content" style="text-align: center; margin: 0 auto;">
        <p class="eyebrow">GET IN TOUCH</p>
        <h1>Let's <span>Connect</span></h1>
        <p class="description" style="margin: 0 auto;">
          I'm always open to new projects, creative collaborations, or just a friendly chat.
        </p>
      </div>
    </section>

    <section class="contact-section">
      <div class="contact-grid">
        <a href="mailto:palmy1983ch@gmail.com" class="contact-card">
          <i class="bx bx-envelope"></i>
          <h3>Email</h3>
          <p>palmy1983ch@gmail.com</p>

        <a href="#" class="contact-card">
          <i class="bx bxl-instagram"></i>
          <h3>Instagram</h3>
          <p>@prantaewin</p>
        </a>

    </section>

  <footer class="footer project-footer">
    <div class="footer-bottom" style="justify-content: center; border-top: none;">
      <p>&copy; 2026 Pran Taewin. All rights reserved.</p>
    </div>
  </footer>

  <script>
    const menuIcon = document.querySelector("#menu-icon");
    const navbar = document.querySelector(".navbar");

    if (menuIcon && navbar) {
      menuIcon.addEventListener("click", () => {
        navbar.classList.toggle("active");
        menuIcon.classList.toggle("bx-x");
      });
    }
  </script>
</body>

</html>
