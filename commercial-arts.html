<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commercial Arts | Pran Taewin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>

<body>

    <header class="header">
        <a href="index.html" class="logo">Pran Portfolio<span>.</span></a>
        <i class="bx bx-menu" id="menu-icon"></i>
        <nav class="navbar">
            <a href="index.html">Home</a>
            <a href="works.html">Works</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>
        <section class="hero project-header">
            <div class="hero-content">
                <p class="eyebrow">COMMERCIAL ARTS</p>
                <h1>Advertising & <span>Product Layouts</span></h1>
                <p class="description">
                    Professional marketing campaigns ranging from educational ads to high-end beverage branding.
                </p>
            </div>
        </section>

        <section class="gallery-single">
            <div class="gallery-item">
                <img src="image/trend4.png" alt="University Ad 1" loading="lazy">
            </div>
            <div class="gallery-item">
                <img src="image/trend5.png" alt="University Ad 2" loading="lazy">
            </div>
            <div class="gallery-item featured"> <img src="image/trend6.png" alt="University Ad 3" loading="lazy">
            </div>

            <div class="gallery-item">
                <img src="image/trend7.png" alt="Matcha Tea branding" loading="lazy">
            </div>
            <div class="gallery-item">
                <img src="image/trend3.png" alt="Fanta Branding" loading="lazy">
            </div>
            <div class="gallery-item featured">
                <img src="image/trend8.png" alt="Valentine Event Poster" loading="lazy">
            </div>
        </section>
    </main>

    <footer class="footer project-footer">
        <div class="footer-bottom" style="justify-content: center; border-top: none;">
            <a href="works.html" class="back-link"><i class='bx bx-left-arrow-alt'></i> Back to Works</a>
        </div>
    </footer>

    <script>
        const menuIcon = document.querySelector("#menu-icon");
        const navbar = document.querySelector(".navbar");

        if (menuIcon && navbar) {
            menuIcon.addEventListener("click", () => {
                navbar.classList.toggle("active");
                menuIcon.classList.toggle("bx-x");
            });
        }
    </script>
</body>

</html>
