<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pran Taewin (Palm) | Portfolio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo"><span class="logo-accent">PRAN</span>.PALM</a>
    <ul class="nav-links">
      <li><a href="#home">หน้าหลัก</a></li>
      <li><a href="#works">ผลงาน</a></li>
      <li><a href="#resume">Resume</a></li>
      <li><a href="#about">เกี่ยวกับผม</a></li>
    </ul>
  </nav>

  <div class="swiper-container mySwiper" id="home">
    <div class="swiper-wrapper">
      <div class="swiper-slide">
        <img src="image/Bannner.webp" alt="Banner">
        <div class="slide-content">
          <div class="slide-info-block">
            <h1>Graphic Designer & Creator</h1>
            <a href="#works" class="btn-cta-green">ดูผลงานทั้งหมด</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <section class="container" id="works">
    <div class="news-header"><h2>MY SELECTED WORKS</h2></div>
    <div id="portfolioGrid" class="news-grid"></div>
  </section>

  <div id="imageModal" class="vw-modal">
    <span class="close-modal" id="closeModal">&times;</span>
    <div class="modal-content">
      <h2 id="modalTitle"></h2>
      <img id="expandedImg" src="">
      <div class="modal-nav-row">
        <button id="prevImg">PREVIOUS</button>
        <button id="nextImg">NEXT</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="script.js"></script>

</html>
