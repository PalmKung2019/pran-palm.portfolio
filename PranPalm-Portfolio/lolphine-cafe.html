<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lolphine Café | Pran Taewin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>

<body>
    <header class="header">
        <a href="index.html" class="logo">Pran Portfolio<span>.</span></a>
        <i class="bx bx-menu" id="menu-icon"></i>
        <nav class="navbar">
            <a href="index.html">Home</a>
            <a href="works.html" class="active">Works</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>
        <section class="hero project-header">
            <div class="hero-content">
                <p class="eyebrow">BRAND IDENTITY</p>
                <h1>Lolphine <span>Café</span></h1>
                <p class="description">
                    A seaside-inspired brand identity combining the warmth of fresh bakery with a relaxing oceanic
                    aesthetic.
                </p>
            </div>
        </section>

        <section>
            <div class="project-meta">
                <div class="meta-item">
                    <h4>Discipline</h4>
                    <p>Brand Identity</p>
                </div>
                <div class="meta-item">
                    <h4>Focus</h4>
                    <p>Logo Design, Social Media, Posters</p>
                </div>
            </div>
        </section>

        <section class="gallery-single">
            <div class="gallery-item featured">
                <img src="image/lolphine-cover.png" alt="Lolphine Cafe Branding" loading="lazy">
            </div>
        </section>
    </main>

    <footer class="footer project-footer">
        <div class="footer-bottom" style="justify-content: center; border-top: none;">
            <a href="works.html" class="back-link"><i class='bx bx-left-arrow-alt'></i> Back to Works</a>
        </div>
    </footer>

    <script>
        const menuIcon = document.querySelector("#menu-icon");
        const navbar = document.querySelector(".navbar");
        if (menuIcon && navbar) {
            menuIcon.addEventListener("click", () => {
                navbar.classList.toggle("active");
                menuIcon.classList.toggle("bx-x");
            });
        }
    </script>
</body>

</html>
