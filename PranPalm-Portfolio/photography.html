<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photography | Pran Taewin</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>

<body>
  <header class="header">
    <a href="index.html" class="logo">Pran Portfolio<span>.</span></a>
    <i class="bx bx-menu" id="menu-icon"></i>
    <nav class="navbar">
      <a href="index.html">Home</a>
      <a href="works.html">Works</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <section class="hero project-header">
      <div class="hero-content">
        <p class="eyebrow">VISUAL ARTS</p>
        <h1>Atmospheric <span>Photography</span></h1>
        <p class="description">
          Capturing the essence of places, products, and personal moments through a designer's eye.
        </p>
      </div>
    </section>

    <section class="gallery-single">
      <div class="gallery-item">
        <img src="image/photo2.jpg" alt="Product Photography" loading="lazy">
      </div>
      <div class="gallery-item">
        <img src="image/photo1.jpg" alt="Temple Photography" loading="lazy">
      </div>

      <div class="gallery-item featured">
        <img src="image/photo3.jpg" alt="Personal Moment" loading="lazy">
      </div>

      <div class="gallery-item">
        <img src="image/photo5.jpg" alt="Studio Portrait" loading="lazy">
      </div>
      <div class="gallery-item">
        <img src="image/photo4.jpg" alt="Portrait" loading="lazy">
      </div>
    </section>
  </main>

  <footer class="footer project-footer">
    <div class="footer-bottom" style="justify-content: center; border-top: none;">
      <a href="works.html" class="back-link"><i class='bx bx-left-arrow-alt'></i> Back to Works</a>
    </div>
  </footer>

  <script>
    const menuIcon = document.querySelector("#menu-icon");
    const navbar = document.querySelector(".navbar");
    if (menuIcon && navbar) {
      menuIcon.addEventListener("click", () => {
        navbar.classList.toggle("active");
        menuIcon.classList.toggle("bx-x");
      });
    }
  </script>
</body>

</html>
